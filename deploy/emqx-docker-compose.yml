version: "3.9"

services:
  emqx:
    image: emqx/emqx:5
    container_name: pal4g-emqx
    restart: unless-stopped
    env_file:
      - ./emqx.env
    ports:
      - "1883:1883"
      - "8883:8883"
      - "18083:18083"
    volumes:
      - ./emqx-data:/opt/emqx/data
      - ./emqx-log:/opt/emqx/log
      - ./certs:/opt/pal4g/emqx/certs:ro

