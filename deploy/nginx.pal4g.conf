server {
    listen 80;
    server_name usr-iot.endpage.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name usr-iot.endpage.net;

    ssl_certificate /etc/letsencrypt/live/usr-iot.endpage.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/usr-iot.endpage.net/privkey.pem;

    root /var/www/pal4g/web/dist;
    index index.html;

    client_max_body_size 20m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/ws/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
